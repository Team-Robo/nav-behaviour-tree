# =============================================================================
# pointcloud_to_laserscan config for nav_behaviour_tree (ROS 2 Humble)
#
# Reduces the Livox Mid-360's PointCloud2 (/livox/lidar, real driver and sim both --
# neither emits a native LaserScan) into the LaserScan (/scan) that AMCL and the
# costmaps in nav2_params.yaml already consume.
# =============================================================================

/**:
  ros__parameters:
    use_sim_time: True
    target_frame: ""
    transform_tolerance: 0.2

    min_height: -0.1
    max_height: 1.0

    angle_min: -3.14159265 # -180 deg
    angle_max: 3.14159265 # +180 deg
    angle_increment: 0.008726646259971648 # ~0.5 deg
    scan_time: 0.1 # matches the sim lidar's 10 Hz update_rate

    range_min: 0.45
    range_max: 12.0

    use_inf: true
    inf_epsilon: 1.0
